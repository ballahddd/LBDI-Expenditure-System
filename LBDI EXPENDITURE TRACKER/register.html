<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="LBDI Budget Expenditure Tracker Registration" />
    <title>LBDI Expenditure Tracker - Register</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Register">
        <header class="card__header">
          <div class="brand">
            <div class="brand__mark" aria-hidden="true">
              <span class="brand__markInner"></span>
            </div>
            <div class="brand__text">
              <p class="brand__org">Liberian Bank for Development &amp; Investment</p>
              <h1 class="brand__app">Create Account</h1>
            </div>
          </div>
          <p class="subtitle">Register a user for the expenditure tracker.</p>
        </header>

        <form class="form" action="./register.php" method="post" novalidate>
          <div class="field">
            <label class="label" for="username">Username</label>
            <div class="control">
              <input class="input" id="username" name="username" type="text" minlength="3" required />
            </div>
          </div>

          <div class="field">
            <label class="label" for="email">Email</label>
            <div class="control">
              <input class="input" id="email" name="email" type="email" required />
            </div>
          </div>

          <div class="field">
            <label class="label" for="firstName">First name</label>
            <div class="control">
              <input class="input" id="firstName" name="first_name" type="text" required />
            </div>
          </div>

          <div class="field">
            <label class="label" for="lastName">Last name</label>
            <div class="control">
              <input class="input" id="lastName" name="last_name" type="text" required />
            </div>
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>
            <div class="control">
              <input class="input" id="password" name="password" type="password" minlength="6" required />
            </div>
          </div>

          <button class="btn" type="submit">
            <span class="btn__text">Create Account</span>
          </button>

          <footer class="card__footer" style="padding-left:0;padding-right:0;padding-bottom:0">
            <a class="link" href="./index.html">Back to login</a>
          </footer>
        </form>
      </section>
    </main>
  </body>
</html>
